<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: "Inter", sans-serif; margin: 0; padding: 0; background: #fff; display: flex; flex-direction: column; height: 100vh; }
    header { padding: 16px; border-bottom: 1px solid #e5e5e5; font-weight: 600; font-size: 14px; position: sticky; top:0; background: #fff; z-index:10;}
    .content { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .label-row { display: flex; justify-content: space-between; align-items: flex-end; }
    .label { font-size: 11px; font-weight: 700; color: #333; }
    .preview { font-size: 10px; color: #888; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    input { width: 100%; border: 1px solid #e5e5e5; padding: 8px 10px; border-radius: 6px; box-sizing: border-box; font-size: 12px; transition: border-color 0.2s; }
    input:focus { outline: none; border-color: #18A0FB; }
    .footer { padding: 16px; border-top: 1px solid #e5e5e5; display: flex; gap: 8px; background: #fff; position: sticky; bottom: 0;}
    button { flex: 1; padding: 10px; font-size: 12px; font-weight: 600; border-radius: 6px; cursor: pointer; border: none; transition: background 0.2s; }
    .btn-update { background: #18A0FB; color: white; }
    .btn-update:hover { background: #0D8DE2; }
    .btn-close { background: #fff; color: #333; border: 1px solid #e5e5e5; }
    .btn-close:hover { background: #f5f5f5; }
  </style>
</head>
<body>
  <header>🎨 템플릿 데이터 일괄 수정</header>
  <div class="content" id="form-container">
    <div style="text-align:center; padding: 30px; color:#888; font-size:12px;">데이터를 불러오는 중입니다...</div>
  </div>
  <div class="footer">
    <button class="btn-close" id="btn-close">닫기</button>
    <button class="btn-update" id="btn-update">디자인 업데이트하기</button>
  </div>

  <script>
    let fieldsData = [];

    window.onmessage = async (event) => {
      const msg = event.data.pluginMessage;
      if (msg.type === 'init-fields') {
        fieldsData = msg.fields;
        renderFields();
      }
    };

    function renderFields() {
      const container = document.getElementById('form-container');
      container.innerHTML = '';
      if (fieldsData.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding: 30px; color:#888; font-size:12px;">수정할 텍스트 레이어(#)를 찾지 못했습니다.</div>';
        return;
      }
      
      fieldsData.forEach((field, i) => {
        const div = document.createElement('div');
        div.className = 'field';
        
        const labelRow = document.createElement('div');
        labelRow.className = 'label-row';

        const label = document.createElement('span');
        label.className = 'label';
        label.innerText = field.name; 
        
        const preview = document.createElement('span');
        preview.className = 'preview';
        preview.innerText = '기존: ' + field.characters;
        
        labelRow.appendChild(label);
        labelRow.appendChild(preview);

        const input = document.createElement('input');
        input.type = 'text';
        input.id = 'input-' + i;
        input.placeholder = '변경할 내용을 입력하세요...';
        input.value = field.characters; 

        div.appendChild(labelRow);
        div.appendChild(input);
        container.appendChild(div);
      });
    }

    document.getElementById('btn-update').onclick = () => {
      const updates = [];
      fieldsData.forEach((field, i) => {
        const input = document.getElementById('input-' + i);
        if (input && input.value !== undefined) {
          updates.push({
            id: field.id,
            characters: input.value
          });
        }
      });
      const btn = document.getElementById('btn-update');
      btn.innerText = "업데이트 중...";
      btn.disabled = true;
      parent.postMessage({ pluginMessage: { type: 'update-texts', updates } }, '*');
      
      setTimeout(() => {
        btn.innerText = "디자인 업데이트하기";
        btn.disabled = false;
      }, 500);
    };

    document.getElementById('btn-close').onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
    };
  </script>
</body>
</html>
